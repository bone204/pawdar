version: '3.8'

services:
  postgres_db:
    image: postgres:15-alpine
    container_name: pawdar_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - '5433:5432'
    volumes:
      - postgres_pawdar_data:/var/lib/postgresql/data

volumes:
  postgres_pawdar_data:
